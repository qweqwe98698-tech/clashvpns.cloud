name: Daily Auto Content Generation

on:
  schedule:
    - cron: '15 17 * * *'
  workflow_dispatch: 

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Generate New Articles
        env:
          # 修改了这里：同时兼容两种密码名字，万无一失！
          API_KEY: ${{ secrets.API_KEY || secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://api.openai.com/v1' }}
          MODEL_NAME: ${{ secrets.MODEL_NAME || 'gpt-4o' }}
        run: |
          node auto_daily_update.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "没有生成新内容，跳过提交"
          else
            git commit -m "Auto-generated daily articles [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: 准备上传文件
        run: node prepare_upload.js

      - name: 🚀 FTP 自动部署至服务器
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ready_to_upload/
          server-dir: /public_html/clashvpns.cloud/
