name: Daily Free Nodes Updater

on:
  schedule:
    # Run twice a day at 04:00 and 16:00 UTC
    - cron: '0 4,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Free Nodes Scraper
        run: node update_free_nodes.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add free_sub.txt
          git commit -m "Auto-update: Refresh free nodes subscription" || echo "No changes to commit"
          git push
