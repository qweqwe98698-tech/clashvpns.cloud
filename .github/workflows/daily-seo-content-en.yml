name: Daily SEO Content Pipeline (English)

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run English SEO Generation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          npm init -y
          npm install node-fetch@2
          node auto_daily_update_en.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add en/
          git add auto_daily_update_en.js
          git commit -m "Auto-update: Generate daily English SEO content" || echo "No changes to commit"
          git push

      - name: 准备上传文件
        run: node prepare_upload.js

      - name: 🚀 FTP 自动部署至服务器
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ready_to_upload/
          server-dir: /public_html/clashvpns.cloud/
