name: Daily SEO Auto Bot & Deploy

on:
  schedule:
    # 每天北京时间早上 9:00 运行 (UTC 时间凌晨 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许在 GitHub Actions 面板手动触发测试

permissions:
  contents: write # 允许机器人提交代码回仓库

jobs:
  generate-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'sakura-site/package-lock.json'

      - name: Install Dependencies
        working-directory: ./sakura-site
        run: npm ci

      - name: Run Auto SEO Bot & FTP Upload
        working-directory: ./sakura-site
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: node scripts/daily_auto_bot.cjs

      - name: Commit Generated Articles & History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sakura-site/src/content/articles/*.md
          git add sakura-site/src/data/seo_published_history.json
          git commit -m "🤖 Auto-generated SEO article and updated history [skip ci]" || echo "No new articles to commit"
          git push
